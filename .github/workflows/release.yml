name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Get version from tag
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "VERSION=$VERSION" >> $GITHUB_ENV
            echo "BUILD_NUMBER=$(echo $VERSION | cut -d'.' -f2)" >> $GITHUB_ENV
          else
            echo "VERSION=dev-$(git rev-parse --short HEAD)" >> $GITHUB_ENV
            echo "BUILD_NUMBER=" >> $GITHUB_ENV
          fi
      - name: Build with Gradle
        run: ./gradlew build --no-daemon --parallel
        env:
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
          VERSION_ROOT: ${{ env.VERSION }}
      - name: List build files
        run: ls -la HMCL/build/libs/
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HMCL-build
          path: |
            HMCL/build/libs/HMCL-*.jar
            HMCL/build/libs/HMCL-*.jar.sha256
            HMCL/build/libs/HMCL-*.exe
            HMCL/build/libs/HMCL-*.exe.sha256
            HMCL/build/libs/HMCL-*.sh
            HMCL/build/libs/HMCL-*.sh.sha256

  create-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: HMCL-build
          path: ./artifacts
      - name: List artifacts
        run: ls -la artifacts/
      - name: Get version from tag
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "VERSION=$VERSION" >> $GITHUB_ENV
          else
            echo "VERSION=dev" >> $GITHUB_ENV
          fi
      - name: Create Release
        run: |
          cd artifacts
          ls -la
          gh release create "${{ github.ref_name }}" \
            HMCL-${{ env.VERSION }}.jar \
            HMCL-${{ env.VERSION }}.exe \
            HMCL-${{ env.VERSION }}.sh \
            --title "HMCL ${{ env.VERSION }}" \
            --notes "更新日志：
1. UI小调整
2. 修复了第三方版本显示为旧作者头像问题
3. 恢复了自动更新功能
4. 更新源改为GitHub Releases
5. Windows用户可自主选择jar或exe，macOS/Linux用jar
6. 弹窗显示最新版本和更新日志
7. 更新后旧的jar/exe剪切到backup文件夹"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
