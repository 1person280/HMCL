name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          java-package: 'jdk+fx'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Get version from tag
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "VERSION=$VERSION" >> $GITHUB_ENV
            echo "BUILD_NUMBER=$(echo $VERSION | cut -d'.' -f2)" >> $GITHUB_ENV
          else
            echo "VERSION=dev-$(git rev-parse --short HEAD)" >> $GITHUB_ENV
            echo "BUILD_NUMBER=" >> $GITHUB_ENV
          fi
      - name: Build with Gradle
        run: ./gradlew build --no-daemon --parallel
        env:
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
          VERSION_ROOT: ${{ env.VERSION }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HMCL-build
          path: |
            HMCL/build/libs/HMCL-*.jar
            HMCL/build/libs/HMCL-*.jar.sha256
            HMCL/build/libs/HMCL-*.exe
            HMCL/build/libs/HMCL-*.exe.sha256
            HMCL/build/libs/HMCL-*.sh
            HMCL/build/libs/HMCL-*.sh.sha256

  create-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: HMCL-build
          path: ./artifacts
      - name: Get version from tag
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "VERSION=$VERSION" >> $GITHUB_ENV
          else
            echo "VERSION=dev" >> $GITHUB_ENV
          fi
      - name: Create Release
        run: |
          cd artifacts
          gh release create "${{ github.ref_name }}" \
            HMCL-${{ env.VERSION }}.jar \
            HMCL-${{ env.VERSION }}.exe \
            HMCL-${{ env.VERSION }}.sh \
            --title "HMCL ${{ env.VERSION }}" \
            --notes "更新内容请查看更新日志" \
            --draft false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
